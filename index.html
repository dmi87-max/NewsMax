<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Svenska Politiknyheter">
  <title>Svenska Politiknyheter</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #333;
    }
    html, body, #root {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function PoliticsNewsApp() {
      const [articles, setArticles] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [lastUpdate, setLastUpdate] = React.useState(null);
      const [refreshing, setRefreshing] = React.useState(false);

      const API_URL = 'https://newsmax.onrender.com';

      // Hämta nyheter
      const fetchNews = async () => {
        try {
          setRefreshing(true);
          setError(null);
          
          const response = await fetch(`${API_URL}/api/news`);
          if (!response.ok) {
            throw new Error(`Server svarade med status ${response.status}`);
          }
          
          const data = await response.json();
          setArticles(data.articles || []);
          setLastUpdate(new Date(data.lastUpdate));
        } catch (err) {
          setError(`Fel: ${err.message}`);
          console.error('API-fel:', err);
        } finally {
          setLoading(false);
          setRefreshing(false);
        }
      };

      // Hämta nyheter vid start
      React.useEffect(() => {
        fetchNews();
        // Uppdatera var 30:e minut
        const interval = setInterval(fetchNews, 30 * 60 * 1000);
        return () => clearInterval(interval);
      }, []);

      const formatDate = (dateString) => {
        const date = new Date(dateString);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);

        if (date.toDateString() === today.toDateString()) {
          return date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
        } else if (date.toDateString() === yesterday.toDateString()) {
          return 'Igår';
        } else {
          return date.toLocaleDateString('sv-SE', { month: 'short', day: 'numeric' });
        }
      };

      const styles = {
        container: {
          maxWidth: '600px',
          margin: '0 auto',
          backgroundColor: '#fff',
          minHeight: '100vh',
          fontFamily: 'system-ui, -apple-system, sans-serif',
          color: '#333',
        },
        header: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          padding: '16px',
          borderBottom: '1px solid #eee',
          backgroundColor: '#f9f9f9',
          position: 'sticky',
          top: 0,
          zIndex: 100,
        },
        title: {
          margin: 0,
          fontSize: '20px',
          fontWeight: '600',
        },
        refreshBtn: {
          background: 'none',
          border: 'none',
          fontSize: '20px',
          cursor: 'pointer',
          padding: '8px',
          opacity: refreshing ? 0.5 : 1,
        },
        error: {
          padding: '12px 16px',
          backgroundColor: '#FFE0E0',
          color: '#c00',
          borderBottom: '1px solid #FFB3B3',
          fontSize: '14px',
        },
        loading: {
          padding: '16px',
          textAlign: 'center',
          color: '#666',
          fontSize: '14px',
        },
        updateInfo: {
          padding: '8px 16px',
          backgroundColor: '#e8f5e9',
          fontSize: '12px',
          color: '#2e7d32',
          borderBottom: '1px solid #c8e6c9',
        },
        articlesList: {
          padding: '0',
        },
        noArticles: {
          padding: '32px 16px',
          textAlign: 'center',
          color: '#999',
        },
        articleCard: {
          display: 'block',
          padding: '12px 16px',
          borderBottom: '1px solid #eee',
          textDecoration: 'none',
          color: 'inherit',
        },
        articleImage: {
          width: '100%',
          height: '180px',
          objectFit: 'cover',
          borderRadius: '6px',
          marginBottom: '8px',
        },
        articleTitle: {
          margin: '0 0 6px 0',
          fontSize: '16px',
          fontWeight: '600',
          lineHeight: '1.3',
          color: '#111',
        },
        articleDescription: {
          margin: '0 0 8px 0',
          fontSize: '14px',
          color: '#666',
          lineHeight: '1.4',
        },
        articleMeta: {
          display: 'flex',
          justifyContent: 'space-between',
          fontSize: '12px',
          color: '#999',
        },
        source: {
          fontWeight: '600',
          color: '#d32f2f',
        },
      };

      return (
        <div style={styles.container}>
          <div style={styles.header}>
            <h1 style={styles.title}>📰 Svenska Politiknyheter</h1>
            <button 
              onClick={fetchNews}
              style={{...styles.refreshBtn, transform: refreshing ? 'rotate(180deg)' : 'none', transition: 'transform 0.3s'}}
              disabled={refreshing}
            >
              🔄
            </button>
          </div>

          {lastUpdate && (
            <div style={styles.updateInfo}>
              Uppdaterad: {lastUpdate.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })}
            </div>
          )}

          {error && <div style={styles.error}>⚠️ {error}</div>}

          {loading && <div style={styles.loading}>Hämtar politiknyheter...</div>}

          {!loading && (
            <div style={styles.articlesList}>
              {articles.length === 0 ? (
                <p style={styles.noArticles}>Inga politiknyheter funna.</p>
              ) : (
                articles.map((article, index) => (
                  <a
                    key={index}
                    href={article.link}
                    target="_blank"
                    rel="noopener noreferrer"
                    style={styles.articleCard}
                  >
                    {article.image && (
                      <img
                        src={article.image}
                        alt=""
                        style={styles.articleImage}
                        onError={(e) => (e.target.style.display = 'none')}
                      />
                    )}
                    <div>
                      <h3 style={styles.articleTitle}>{article.title}</h3>
                      {article.description && (
                        <p style={styles.articleDescription}>{article.description.substring(0, 150)}...</p>
                      )}
                      <div style={styles.articleMeta}>
                        <span style={styles.source}>{article.source}</span>
                        <span>{formatDate(article.pubDate)}</span>
                      </div>
                    </div>
                  </a>
                ))
              )}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PoliticsNewsApp />);
  </script>
</body>
</html>
